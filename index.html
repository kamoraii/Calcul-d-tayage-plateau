<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icone.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Etayage">

<title>Calcul Étayage</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}

h2{
margin-top:0;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
margin-top:8px;
color:white;
}

.calc{background:#1976d2;}
.reset{background:#d32f2f;}
.export{background:#388e3c;}

.grid{
font-family:monospace;
font-size:22px;
white-space:pre;
text-align:center;
}

.small{
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Dimensions</h2>

<label>Largeur</label>
<input id="largeur" type="number">
<select id="largeur_unit">
<option value="maille">mailles</option>
<option value="metre">mètres</option>
</select>

<label>Profondeur</label>
<input id="profondeur" type="number">
<select id="profondeur_unit">
<option value="maille">mailles</option>
<option value="metre">mètres</option>
</select>

<button class="calc" onclick="calculer()">Calculer</button>
<button class="reset" onclick="resetAll()">Reset</button>
<button class="export" onclick="exportImage()">Exporter tableau</button>

</div>


<div id="exportZone">

<div class="card">
<h2>Tableau</h2>
<div id="grid" class="grid"></div>
</div>

<div class="card">
<h2>Résultats</h2>

<div id="results"></div>

</div>

</div>


<div class="card small">

<h3>Composition d’un étaie</h3>

<label>Poteaux</label>
<input id="poteaux_par" type="number" value="1">

<label>Vérins</label>
<input id="verins_par" type="number" value="2">

<label>Cales bois</label>
<input id="cales_par" type="number" value="2">

<button onclick="resetEtaie()">Réinitialiser composition étaie</button>

</div>

</div>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function toMailles(val,unit){

if(unit==="maille") return val

return val/2

}


function calculer(){

let largeur=parseFloat(document.getElementById("largeur").value)
let profondeur=parseFloat(document.getElementById("profondeur").value)

let unitL=document.getElementById("largeur_unit").value
let unitP=document.getElementById("profondeur_unit").value

if(!largeur) return

if(!profondeur) profondeur=1

let L=Math.round(toMailles(largeur,unitL))
let P=Math.round(toMailles(profondeur,unitP))

localStorage.setItem("largeur",largeur)
localStorage.setItem("profondeur",profondeur)

let E=L*P
let moises=(L-1)*P

let poteaux_par=parseInt(document.getElementById("poteaux_par").value)
let verins_par=parseInt(document.getElementById("verins_par").value)
let cales_par=parseInt(document.getElementById("cales_par").value)

let poteaux=E*poteaux_par
let verins=E*verins_par
let cales=E*cales_par

drawGrid(L,P)

document.getElementById("results").innerHTML=`
<p><b>Étais : ${E}</b></p>

<p><b>Matériel à commander :</b></p>

<p>Moises : ${moises}</p>
<p>Poteaux : ${poteaux}</p>
<p>Vérins : ${verins}</p>
<p>Cales bois : ${cales}</p>
`

}


function drawGrid(L,P){

let g=""

for(let y=0;y<P;y++){

for(let x=0;x<L;x++){

g+="●"

if(x<L-1) g+="—"

}

g+="\n"

}

document.getElementById("grid").textContent=g

}


function resetAll(){

localStorage.clear()

document.getElementById("largeur").value=""
document.getElementById("profondeur").value=""

document.getElementById("grid").textContent=""
document.getElementById("results").innerHTML=""

}


function resetEtaie(){

document.getElementById("poteaux_par").value=1
document.getElementById("verins_par").value=2
document.getElementById("cales_par").value=2

}


function exportImage(){

html2canvas(document.querySelector("#exportZone")).then(canvas=>{

let link=document.createElement("a")
link.download="etayage.png"
link.href=canvas.toDataURL()
link.click()

})

}


window.onload=function(){

let L=localStorage.getItem("largeur")
let P=localStorage.getItem("profondeur")

if(L) document.getElementById("largeur").value=L
if(P) document.getElementById("profondeur").value=P

}

</script>

</body>
</html>
