<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etayage</title>

<link rel="apple-touch-icon" href="icone.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Etayage">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#f2f2f2;
margin:0;
padding:16px;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.title{
font-size:18px;
font-weight:600;
}

.subtitle{
font-size:12px;
color:#666;
}

input,select{
width:100%;
padding:10px;
font-size:16px;
margin-top:4px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:8px;
color:white;
}

.calc{background:#1976d2;}
.reset{background:#d32f2f;}
.export{background:#2e7d32;}

.grid{
font-family:monospace;
font-size:22px;
white-space:pre;
text-align:center;
}

.results p{
margin:6px 0;
}

.advanced{
font-size:13px;
background:#fafafa;
}

.advanced input{
background:#eee;
}

.smallTitle{
font-size:14px;
font-weight:600;
margin-bottom:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">Largeur</div>
<div class="subtitle">(maille ou mètre)</div>

<input id="largeur" type="number">
<select id="largeur_unit">
<option value="maille">mailles</option>
<option value="metre">mètres</option>
</select>


<div class="title">Profondeur</div>
<div class="subtitle">(maille ou mètre)</div>

<input id="profondeur" type="number">
<select id="profondeur_unit">
<option value="maille">mailles</option>
<option value="metre">mètres</option>
</select>


<button class="calc" onclick="calculer()">Calculer</button>
<button class="export" onclick="exportImage()">Exporter tableau</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>


<div id="exportZone">

<div class="card">

<h3>Tableau</h3>

<div id="grid" class="grid"></div>

</div>


<div class="card">

<h3>Résultats</h3>

<div id="results" class="results"></div>

</div>

</div>


<div class="card advanced">

<div class="smallTitle">Composition d’un étaie (modification exceptionnelle)</div>

<button onclick="unlockEtaie()">Modifier composition</button>

<label>Poteaux</label>
<input id="poteaux_par" type="number" value="1" disabled>

<label>Vérins</label>
<input id="verins_par" type="number" value="2" disabled>

<label>Cales bois</label>
<input id="cales_par" type="number" value="2" disabled>

<button onclick="resetEtaie()">Réinitialiser composition étaie</button>

</div>

</div>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function toMailles(val,unit){

if(unit==="maille") return val

return val/2

}


function calculer(){

let largeur=parseFloat(document.getElementById("largeur").value)

if(!largeur) return

let profondeur=parseFloat(document.getElementById("profondeur").value)

if(!profondeur) profondeur=1

let unitL=document.getElementById("largeur_unit").value
let unitP=document.getElementById("profondeur_unit").value

let L=Math.round(toMailles(largeur,unitL))
let P=Math.round(toMailles(profondeur,unitP))

let largeur_m=L*2
let profondeur_m=P*2

localStorage.setItem("largeur",largeur)
localStorage.setItem("profondeur",profondeur)

let E=L*P
let moises=(L-1)*P

let poteaux_par=parseInt(document.getElementById("poteaux_par").value)
let verins_par=parseInt(document.getElementById("verins_par").value)
let cales_par=parseInt(document.getElementById("cales_par").value)

let poteaux=E*poteaux_par
let verins=E*verins_par
let cales=E*cales_par

drawGrid(L,P)

document.getElementById("results").innerHTML=`

<p><b>Étais : ${E}</b></p>

<p><b>Matériel à commander pour une scène de :</b></p>

<p>Largeur : ${largeur_m} m</p>
<p>Profondeur : ${profondeur_m} m</p>

<br>

<p>Moises : ${moises}</p>
<p>Poteaux : ${poteaux}</p>
<p>Vérins : ${verins}</p>
<p>Cales bois : ${cales}</p>

`

}


function drawGrid(L,P){

let g=""

for(let y=0;y<P;y++){

for(let x=0;x<L;x++){

g+="●"

if(x<L-1) g+="—"

}

g+="\n"

}

document.getElementById("grid").textContent=g

}


function resetAll(){

localStorage.clear()

document.getElementById("largeur").value=""
document.getElementById("profondeur").value=""

document.getElementById("grid").textContent=""
document.getElementById("results").innerHTML=""

}


function unlockEtaie(){

document.getElementById("poteaux_par").disabled=false
document.getElementById("verins_par").disabled=false
document.getElementById("cales_par").disabled=false

document.getElementById("poteaux_par").style.background="white"
document.getElementById("verins_par").style.background="white"
document.getElementById("cales_par").style.background="white"

}


function resetEtaie(){

document.getElementById("poteaux_par").value=1
document.getElementById("verins_par").value=2
document.getElementById("cales_par").value=2

}


function exportImage(){

html2canvas(document.querySelector("#exportZone")).then(canvas=>{

let link=document.createElement("a")

link.download="etayage.png"

link.href=canvas.toDataURL()

link.click()

})

}


window.onload=function(){

let L=localStorage.getItem("largeur")
let P=localStorage.getItem("profondeur")

if(L) document.getElementById("largeur").value=L
if(P) document.getElementById("profondeur").value=P

}


if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js')
}

</script>

</body>
</html>
