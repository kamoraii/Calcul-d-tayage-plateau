<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculateur d’étayage de scène</title>

<link rel="apple-touch-icon" href="icone.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Etayage">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f6df6">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Arial;
margin:0;
padding:16px;
background:linear-gradient(180deg,#2f6df6,#4f8cff);
min-height:100vh;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:white;
padding:16px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.headerRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:6px;
}

.headerRow h3{
margin:0;
font-size:16px;
}

.headerRow select{
width:120px;
height:36px;
border-radius:8px;
border:2px solid #2f6df6;
background:#f0f5ff;
}

.measureRow{
display:flex;
align-items:center;
gap:10px;
margin-top:8px;
}

.measureRow button{
width:38px;
height:38px;
font-size:20px;
background:#2f6df6;
border:none;
border-radius:8px;
color:white;
}

.measureRow input{
width:80px;
padding:8px;
font-size:18px;
text-align:center;
border-radius:10px;
border:3px solid #2f6df6;
background:#f0f5ff;
font-weight:600;
}

button.main{
width:100%;
padding:11px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:8px;
color:white;
}

.calc{background:#2f6df6;}
.reset{background:#d84343;}
.export{background:#2e9e53;}

.materialBlock{
background:#e8f0ff;
border-radius:10px;
padding:12px;
margin-top:10px;
}

.materialTitle{
font-size:20px;
font-weight:700;
color:#1a3fd8;
}

#plan{
width:100%;
margin-top:10px;
}

.titleMain{
color:white;
text-align:center;
margin-bottom:4px;
}

.subtitle{
color:white;
text-align:center;
font-size:14px;
margin-top:0;
margin-bottom:18px;
}

</style>

</head>

<body>

<div class="container">

<h1 class="titleMain">Calculateur d’étayage de scène</h1>

<p class="subtitle">
Entrez les dimensions de la scène.<br>
Les valeurs peuvent être saisies en <b>mailles</b> ou en <b>mètres</b>.<br>
<b>1 maille = 2 m</b>
</p>

<div class="card">

<div class="headerRow">
<h3>LARGEUR (mailles ou mètres)</h3>

<select id="largeur_unit">
<option value="maille">mailles</option>
<option value="metre">mètres</option>
</select>
</div>

<div class="measureRow">
<button onclick="changeValue('largeur','largeur_unit',-1)">−</button>
<input id="largeur" type="number">
<button onclick="changeValue('largeur','largeur_unit',1)">+</button>
</div>


<div class="headerRow">
<h3>PROFONDEUR (mailles ou mètres)</h3>

<select id="profondeur_unit">
<option value="maille">mailles</option>
<option value="metre">mètres</option>
</select>
</div>

<div class="measureRow">
<button onclick="changeValue('profondeur','profondeur_unit',-1)">−</button>
<input id="profondeur" type="number">
<button onclick="changeValue('profondeur','profondeur_unit',1)">+</button>
</div>

<button class="main calc" onclick="calculer()">Calculer</button>
<button class="main reset" onclick="resetAll()">Reset</button>

</div>


<div class="card">

<h3>Plan d’étayage</h3>

<svg id="plan"></svg>

</div>


<div class="card">

<h3>Résultats</h3>

<div id="results"></div>

</div>

</div>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function changeValue(id,unitId,delta){

let input=document.getElementById(id)
let unit=document.getElementById(unitId).value

let value=parseFloat(input.value)||0

if(unit==="metre"){
value+=delta*2
}else{
value+=delta
}

if(value<0)value=0

input.value=value

}

function toMailles(val,unit){

if(unit==="maille") return val

return val/2

}

function calculer(){

let largeur=parseFloat(document.getElementById("largeur").value)

if(!largeur) return

let profondeur=parseFloat(document.getElementById("profondeur").value)

if(!profondeur) profondeur=1

let unitL=document.getElementById("largeur_unit").value
let unitP=document.getElementById("profondeur_unit").value

let L=Math.round(toMailles(largeur,unitL))
let P=Math.round(toMailles(profondeur,unitP))

let largeur_m=L*2
let profondeur_m=P*2

let E=L*P
let moises=(L-1)*P
let doubles_colliers=Math.ceil(moises/2)

/* calcul poids estimé */

let poids_total=Math.round((E*13.5)+(moises*7))

drawPlan(L,P)

document.getElementById("results").innerHTML=`

<div class="materialBlock" id="commande">

<div class="materialTitle">Matériel à commander</div>

<p>Largeur : ${largeur_m} m</p>
<p>Profondeur : ${profondeur_m} m</p>

<p>Moises : ${moises}</p>
<p>Poteaux : ${E}</p>
<p>Vérins : ${E*2}</p>
<p>Cales bois : ${E*2}</p>
<p>Doubles colliers : ${doubles_colliers} (${doubles_colliers} doubles colliers)</p>

<p style="font-size:13px;color:#555;">
(poids estimé : ${poids_total} kg)
</p>

</div>

<button class="main export" onclick="exportCommande()">Exporter la commande</button>

`

}

function drawPlan(L,P){

let svg=document.getElementById("plan")

let size=70

let width=L*size
let height=P*size

svg.setAttribute("viewBox",`0 0 ${width} ${height}`)

let content=""

for(let x=0;x<=L;x++){

let pos=x*size

content+=`<line x1="${pos}" y1="0" x2="${pos}" y2="${height}" stroke="#cccccc" stroke-width="1"/>`

}

for(let y=0;y<=P;y++){

let pos=y*size

content+=`<line x1="0" y1="${pos}" x2="${width}" y2="${pos}" stroke="#cccccc" stroke-width="1"/>`

}

for(let y=0;y<P;y++){

for(let x=0;x<L;x++){

let cx=(x+0.5)*size
let cy=(y+0.5)*size

content+=`<circle cx="${cx}" cy="${cy}" r="6" fill="black"/>`

if(x<L-1){

let nx=(x+1.5)*size

content+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${cy}" stroke="black" stroke-width="4"/>`

}

}

}

svg.innerHTML=content

}

function resetAll(){

document.getElementById("largeur").value=""
document.getElementById("profondeur").value=""
document.getElementById("results").innerHTML=""
document.getElementById("plan").innerHTML=""

}

function exportCommande(){

html2canvas(document.querySelector("#commande")).then(canvas=>{

let link=document.createElement("a")

link.download="commande_etayage.png"

link.href=canvas.toDataURL()

link.click()

})

}

</script>

</body>
</html>
