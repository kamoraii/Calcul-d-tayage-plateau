<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etayage</title>

<link rel="apple-touch-icon" href="icone.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Etayage">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f6df6">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Arial;
margin:0;
padding:16px;
background:linear-gradient(180deg,#2f6df6,#4f8cff);
min-height:100vh;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:white;
padding:16px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.title{
font-size:17px;
font-weight:600;
margin-top:6px;
}

.subtitle{
font-size:12px;
color:#666;
margin-bottom:6px;
}

/* zone mesure */

.measureRow{
display:flex;
align-items:center;
gap:8px;
margin-bottom:12px;
}

/* boutons + - */

.measureRow button{
width:38px;
height:38px;
font-size:20px;
background:#2f6df6;
border:none;
border-radius:8px;
color:white;
}

/* champ mesure */

.measureRow input{
width:80px;
padding:8px;
font-size:18px;
text-align:center;
border-radius:10px;
border:3px solid #2f6df6;
background:#f0f5ff;
font-weight:600;
}

/* unité */

.measureRow select{
width:55px;
height:38px;
font-size:14px;
border-radius:8px;
border:2px solid #2f6df6;
background:#f0f5ff;
}

/* boutons principaux */

.mainButton{
width:100%;
padding:11px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:6px;
color:white;
}

.calc{background:#2f6df6;}
.reset{background:#d84343;}
.export{background:#2e9e53;}

#plan{
width:100%;
height:auto;
}

.resultBlock{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

.materialBlock{
background:#e8f0ff;
border-radius:10px;
padding:12px;
margin-top:10px;
}

.materialTitle{
font-size:20px;
font-weight:700;
color:#1a3fd8;
margin-bottom:6px;
}

.materialBlock p{
margin:4px 0;
font-size:16px;
}

.advanced{
background:rgba(255,255,255,0.6);
padding:10px;
border-radius:10px;
font-size:13px;
}

.hidden{
display:none;
}

.smallButton{
background:#666;
font-size:13px;
padding:7px;
border-radius:8px;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">Largeur</div>
<div class="subtitle">(maille ou mètre)</div>

<div class="measureRow">

<button onclick="changeValue('largeur','largeur_unit',-1)">−</button>

<input id="largeur" type="number">

<button onclick="changeValue('largeur','largeur_unit',1)">+</button>

<select id="largeur_unit">
<option value="maille">M</option>
<option value="metre">m</option>
</select>

</div>

<div class="title">Profondeur</div>
<div class="subtitle">(maille ou mètre)</div>

<div class="measureRow">

<button onclick="changeValue('profondeur','profondeur_unit',-1)">−</button>

<input id="profondeur" type="number">

<button onclick="changeValue('profondeur','profondeur_unit',1)">+</button>

<select id="profondeur_unit">
<option value="maille">M</option>
<option value="metre">m</option>
</select>

</div>

<button class="mainButton calc" onclick="calculer()">Calculer</button>
<button class="mainButton reset" onclick="resetAll()">Reset</button>

</div>

<div class="card">

<h3>Plan d’étayage</h3>
<svg id="plan"></svg>

</div>

<div class="card">

<h3>Résultats</h3>
<div id="results"></div>

</div>

<div class="advanced">

<button class="smallButton" onclick="toggleEtaie()">Modifier composition étaie</button>

<div id="etaieBlock" class="hidden">

<label>Poteaux</label>
<input id="poteaux_par" type="number" value="1">

<label>Vérins</label>
<input id="verins_par" type="number" value="2">

<label>Cales bois</label>
<input id="cales_par" type="number" value="2">

</div>

</div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function changeValue(id,unitId,delta){

let input=document.getElementById(id)
let unit=document.getElementById(unitId).value

let value=parseFloat(input.value)||0

if(unit==="metre"){
value+=delta*2
}else{
value+=delta
}

if(value<0) value=0

input.value=value

}

function toMailles(val,unit){
if(unit==="maille") return val
return val/2
}

function calculer(){

let largeur=parseFloat(document.getElementById("largeur").value)
if(!largeur) return

let profondeur=parseFloat(document.getElementById("profondeur").value)
if(!profondeur) profondeur=1

let unitL=document.getElementById("largeur_unit").value
let unitP=document.getElementById("profondeur_unit").value

let L=Math.round(toMailles(largeur,unitL))
let P=Math.round(toMailles(profondeur,unitP))

let largeur_m=L*2
let profondeur_m=P*2

localStorage.setItem("largeur",largeur)
localStorage.setItem("profondeur",profondeur)

let E=L*P
let moises=(L-1)*P
let doubles_colliers=Math.ceil(moises/2)

let poteaux_par=parseInt(document.getElementById("poteaux_par").value)
let verins_par=parseInt(document.getElementById("verins_par").value)
let cales_par=parseInt(document.getElementById("cales_par").value)

let poteaux=E*poteaux_par
let verins=E*verins_par
let cales=E*cales_par

drawPlan(L,P)

document.getElementById("results").innerHTML=`

<div class="resultBlock">Étais : ${E}</div>

<div class="materialBlock" id="commande">

<div class="materialTitle">
Matériel à commander
</div>

<p>Largeur : ${largeur_m} m</p>
<p>Profondeur : ${profondeur_m} m</p>

<br>

<p><b>Moises :</b> ${moises}</p>
<p><b>Poteaux :</b> ${poteaux}</p>
<p><b>Vérins :</b> ${verins}</p>
<p><b>Cales bois :</b> ${cales}</p>
<p><b>Doubles colliers :</b> ${doubles_colliers} (${doubles_colliers} doubles colliers)</p>

<button class="mainButton export" onclick="exportCommande()">Exporter la commande</button>

</div>

`

}

function drawPlan(L,P){

let svg=document.getElementById("plan")
let size=55

let width=L*size
let height=P*size

svg.setAttribute("viewBox",`0 0 ${width} ${height}`)

let content=""

for(let y=0;y<P;y++){
for(let x=0;x<L;x++){

let cx=x*size+size/2
let cy=y*size+size/2

content+=`<circle cx="${cx}" cy="${cy}" r="5" fill="black"/>`

if(x<L-1){
let nx=(x+1)*size+size/2
content+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${cy}" stroke="black" stroke-width="3"/>`
}

}
}

svg.innerHTML=content

}

function resetAll(){

localStorage.clear()

document.getElementById("largeur").value=""
document.getElementById("profondeur").value=""
document.getElementById("plan").innerHTML=""
document.getElementById("results").innerHTML=""

}

function toggleEtaie(){
document.getElementById("etaieBlock").classList.toggle("hidden")
}

function exportCommande(){

html2canvas(document.querySelector("#commande")).then(canvas=>{

let link=document.createElement("a")
link.download="commande_etayage.png"
link.href=canvas.toDataURL()
link.click()

})

}

window.onload=function(){

let L=localStorage.getItem("largeur")
let P=localStorage.getItem("profondeur")

if(L) document.getElementById("largeur").value=L
if(P) document.getElementById("profondeur").value=P

}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js')
}

</script>

</body>
</html>
