<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <!-- Icône pour écran d'accueil iPhone / Apple -->
    <link rel="apple-touch-icon" href="icone.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Etayage">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Étayage scène · web app</title>
    <style>
        /* RESET & socle */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #c6d9eb 0%, #dbeafe 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 10px;
            margin: 0;
        }

        .app {
            max-width: 640px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Cartes avec relief */
        .card {
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 22px 22px;
            box-shadow: 
                0 18px 30px -10px rgba(0, 30, 60, 0.25),
                inset 0 -3px 0 rgba(0,0,0,0.05),
                inset 0 2px 4px rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 {
            font-size: 1.45rem;
            font-weight: 600;
            margin-bottom: 22px;
            color: #193e60;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
            border-left: 7px solid #ff9f4b;
            padding-left: 16px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }

        /* Dimensions : entrées plus compactes, mieux équilibrées */
        .dimensions-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dim-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            background: #eef4fc;
            padding: 12px 16px;
            border-radius: 100px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02), 0 3px 6px rgba(53, 100, 150, 0.08);
        }

        .dim-label {
            font-weight: 600;
            min-width: 80px;
            color: #26577c;
            font-size: 1.05rem;
        }

        .dim-input-group {
            display: flex;
            flex: 2 1 220px;
            gap: 8px;
        }

        .dim-input-group input {
            flex: 1 1 100px;
            padding: 13px 18px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            background: #ffffff;
            box-shadow: 0 5px 10px rgba(0, 20, 40, 0.08), inset 0 1px 2px #ffffff, inset 0 -2px 3px rgba(0,0,0,0.02);
            transition: 0.15s;
            outline: 2px solid transparent;
        }

        .dim-input-group input:focus {
            outline: 2px solid #ff9f4b;
            box-shadow: 0 8px 15px rgba(255, 140, 0, 0.15);
        }

        .dim-unit {
            padding: 10px 16px;
            background: white;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            color: #1f4970;
            cursor: pointer;
            font-size: 0.95rem;
            box-shadow: 0 5px 8px rgba(0,0,0,0.05), inset 0 -2px 0 #b0c8dd;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23336699" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 38px;
        }

        /* Boutons : contrastes et relief */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 18px 0 8px 0;
        }

        .btn {
            border: none;
            padding: 16px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
            background: #f2f6fb;
            color: #162b3c;
            flex: 1 0 auto;
            min-width: 115px;
            box-shadow: 0 8px 14px rgba(0, 30, 60, 0.12), 0 3px 0 #b3c9dd, 0 2px 4px rgba(255,255,255,0.5) inset;
            transition: 0.1s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.5);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 6px rgba(0,0,0,0.1), 0 1px 0 #a0b8cf inset;
        }

        .btn.primary {
            background: #1d7eb5;
            color: white;
            box-shadow: 0 10px 18px -6px #0967a0, 0 3px 0 #0a4b76, 0 2px 4px rgba(255,255,255,0.3) inset;
        }

        .btn.reset {
            background: #d44e4e;
            color: white;
            box-shadow: 0 10px 18px -6px #aa3c3c, 0 3px 0 #7f2f2f, 0 2px 4px rgba(255,255,255,0.2) inset;
        }

        .btn.export {
            background: #2f8f5f;
            color: white;
            box-shadow: 0 10px 18px -6px #1f7047, 0 3px 0 #165735, 0 2px 4px rgba(255,255,255,0.2) inset;
        }

        /* Résultats et matériel */
        .resultats {
            background: #e3effb;
            border-radius: 28px;
            padding: 22px 20px;
            margin: 18px 0 6px 0;
            box-shadow: inset 0 2px 5px #b3c9dd, 0 8px 15px rgba(0,40,70,0.1);
        }

        .resultats p {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 6px 0;
            color: #113853;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .resultats span {
            background: #1f6090;
            color: white;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 1.2rem;
            box-shadow: 0 5px 0 #0f3550;
        }

        .materiel-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 18px;
        }

        .materiel-item {
            background: white;
            padding: 14px 4px;
            border-radius: 26px;
            text-align: center;
            box-shadow: 0 6px 0 #b0c6da, 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ffffff;
        }

        .materiel-item span {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2d577c;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .materiel-item strong {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: #1f4460;
            line-height: 1.2;
        }

        /* Tableau (schéma) avec style « relief creusé » */
        .tableau-container {
            overflow-x: auto;
            white-space: pre;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.45rem;
            font-weight: 500;
            line-height: 1.6;
            background: #162b38;
            color: #ffdea4;
            padding: 24px 16px;
            border-radius: 40px;
            margin: 15px 0 0 0;
            text-shadow: 0 0 8px #ffb96a;
            letter-spacing: 4px;
            box-shadow: 
                inset 0 -6px 0 #0f1f29,
                inset 0 6px 10px #2e4b5c,
                0 15px 20px rgba(0,0,0,0.2);
            border: 2px solid #497b98;
        }

        .tableau-container pre {
            font-family: inherit;
            margin: 0;
            display: inline-block;
            background: #10242f;
            padding: 12px 18px;
            border-radius: 28px;
            box-shadow: inset 0 0 0 2px #45718a;
        }

        /* section composition : discrète mais lisible */
        .compo-avancee {
            background: #eef5fd;
            border-radius: 36px;
            padding: 18px 22px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 15px -5px rgba(0,30,60,0.15), inset 0 1px 4px white;
        }

        .compo-avancee h3 {
            font-size: 1.0rem;
            font-weight: 600;
            color: #28638b;
            letter-spacing: 0.2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
        }

        .compo-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .compo-field {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .compo-field label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #3b6082;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .compo-field input {
            padding: 12px 10px;
            border-radius: 40px;
            border: none;
            background: white;
            width: 95px;
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 0 5px 0 #afc7dc, inset 0 2px 6px white;
            border: 1px solid #c1d6e9;
        }

        .small-btn {
            background: #d6e5f5;
            border: none;
            border-radius: 60px;
            padding: 12px 22px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #11324b;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 6px 0 #97b1c9, 0 4px 8px rgba(0,0,0,0.08);
            border: 1px solid #f0f8ff;
            transition: 0.05s linear;
        }

        .small-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #97b1c9;
        }

        /* petit footer */
        .footnote {
            color: #315d7c;
            font-size: 0.7rem;
            text-align: center;
            padding: 6px;
            font-weight: 500;
            text-shadow: 0 1px 1px white;
        }

        /* responsive : ajustements */
        @media (max-width: 480px) {
            .dim-row {
                border-radius: 30px;
                padding: 12px 12px;
            }
            .dim-label {
                min-width: 70px;
                font-size: 0.95rem;
            }
            .materiel-list {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .btn {
                padding: 14px 12px;
                font-size: 0.95rem;
            }
        }
    </style>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="app" id="app">

    <!-- Carte dimensions (refonte ergonomique) -->
    <div class="card">
        <h2>📐 Dimensions scène</h2>
        <div class="dimensions-grid">
            <div class="dim-row">
                <span class="dim-label">Largeur</span>
                <div class="dim-input-group">
                    <input type="number" id="largeurValue" step="0.1" min="0.1" value="4">
                    <select id="largeurUnit" class="dim-unit">
                        <option value="mailles">mailles</option>
                        <option value="metres">mètres</option>
                    </select>
                </div>
            </div>
            <div class="dim-row">
                <span class="dim-label">Profondeur</span>
                <div class="dim-input-group">
                    <input type="number" id="profondeurValue" step="0.1" min="0.1" placeholder="1 (par défaut)">
                    <select id="profondeurUnit" class="dim-unit">
                        <option value="mailles">mailles</option>
                        <option value="metres">mètres</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="button-group">
            <button class="btn primary" id="btnCalculer">📏 Calculer</button>
            <button class="btn reset" id="btnReset">♻️ Reset</button>
            <button class="btn export" id="btnExporter">⬇️ Exporter</button>
        </div>
    </div>

    <!-- Bloc tableau + résultats (exporté) -->
    <div class="card" id="exportBlock">
        <h2>⚙️ Échafaudage & matériel</h2>
        <div id="tableauVisuel" class="tableau-container">
            <pre id="schemaPre">●—●—●<br>●—●—●</pre>
        </div>

        <div id="resultatsSection" class="resultats">
            <p><span>🔧 Étais</span> <strong id="etaisCount">6</strong></p>
            <div class="materiel-list" id="materielList">
                <div class="materiel-item"><span>Moises</span><strong id="moisesCount">4</strong></div>
                <div class="materiel-item"><span>Poteaux</span><strong id="poteauxCount">6</strong></div>
                <div class="materiel-item"><span>Vérins</span><strong id="verinsCount">12</strong></div>
                <div class="materiel-item"><span>Cales bois</span><strong id="calesCount">12</strong></div>
            </div>
        </div>
    </div>

    <!-- Composition d'un étaie (discrète, en retrait) -->
    <div class="compo-avancee">
        <h3>🛠️ Composition d’un étaie (modif exceptionnelle)</h3>
        <div class="compo-inputs">
            <div class="compo-field">
                <label>Poteaux</label>
                <input type="number" id="compoPoteaux" min="0" value="1" step="1">
            </div>
            <div class="compo-field">
                <label>Vérins</label>
                <input type="number" id="compoVerins" min="0" value="2" step="1">
            </div>
            <div class="compo-field">
                <label>Cales bois</label>
                <input type="number" id="compoCales" min="0" value="2" step="1">
            </div>
        </div>
        <button class="small-btn" id="btnResetCompo">↩️ Réinitialiser composition étaie</button>
    </div>

    <div class="footnote">Étayage web-app · ajouter à l’écran d’accueil iPhone</div>
</div>

<script>
    (function() {
        // ----- DOM -----
        const largeurInput = document.getElementById('largeurValue');
        const largeurUnit = document.getElementById('largeurUnit');
        const profondeurInput = document.getElementById('profondeurValue');
        const profondeurUnit = document.getElementById('profondeurUnit');
        const btnCalculer = document.getElementById('btnCalculer');
        const btnReset = document.getElementById('btnReset');
        const btnExporter = document.getElementById('btnExporter');
        const btnResetCompo = document.getElementById('btnResetCompo');

        const compoPoteaux = document.getElementById('compoPoteaux');
        const compoVerins = document.getElementById('compoVerins');
        const compoCales = document.getElementById('compoCales');

        const etaisSpan = document.getElementById('etaisCount');
        const moisesSpan = document.getElementById('moisesCount');
        const poteauxSpan = document.getElementById('poteauxCount');
        const verinsSpan = document.getElementById('verinsCount');
        const calesSpan = document.getElementById('calesCount');
        const schemaPre = document.getElementById('schemaPre');

        // ----- localStorage -----
        function saveToStorage() {
            try {
                localStorage.setItem('etayage_largeur', largeurInput.value);
                localStorage.setItem('etayage_largeurUnit', largeurUnit.value);
                localStorage.setItem('etayage_profondeur', profondeurInput.value);
                localStorage.setItem('etayage_profondeurUnit', profondeurUnit.value);
            } catch (e) {}
        }

        function loadFromStorage() {
            try {
                const lVal = localStorage.getItem('etayage_largeur');
                const lUnit = localStorage.getItem('etayage_largeurUnit');
                const pVal = localStorage.getItem('etayage_profondeur');
                const pUnit = localStorage.getItem('etayage_profondeurUnit');
                if (lVal !== null) largeurInput.value = lVal;
                if (lUnit !== null) largeurUnit.value = lUnit;
                if (pVal !== null) profondeurInput.value = pVal;
                if (pUnit !== null) profondeurUnit.value = pUnit;
            } catch (e) {}
        }

        // ----- conversion en mailles entières -----
        function getMailleInt(inputEl, unitEl) {
            let raw = parseFloat(inputEl.value);
            if (isNaN(raw) || raw <= 0) raw = 1;
            if (unitEl.value === 'metres') {
                return Math.ceil(raw / 2);
            } else {
                return Math.ceil(raw);
            }
        }

        // ----- mise à jour complète (identique fonctionnement, seulement le style change) -----
        function mettreAJour() {
            const poteauxParEtaie = parseInt(compoPoteaux.value, 10) || 1;
            const verinsParEtaie = parseInt(compoVerins.value, 10) || 2;
            const calesParEtaie = parseInt(compoCales.value, 10) || 2;

            // valeur par défaut profondeur
            if (profondeurInput.value.trim() === '' || isNaN(parseFloat(profondeurInput.value))) {
                if (profondeurUnit.value === 'metres') {
                    profondeurInput.value = '2';
                } else {
                    profondeurInput.value = '1';
                }
            }
            if (largeurInput.value.trim() === '' || isNaN(parseFloat(largeurInput.value))) {
                largeurInput.value = '4';
                largeurUnit.value = 'mailles';
            }

            const L = getMailleInt(largeurInput, largeurUnit);
            const P = getMailleInt(profondeurInput, profondeurUnit);

            const etais = L * P;
            const moises = (L - 1) * P;
            const poteaux = etais * poteauxParEtaie;
            const verins = etais * verinsParEtaie;
            const cales = etais * calesParEtaie;

            etaisSpan.textContent = etais;
            moisesSpan.textContent = moises >= 0 ? moises : 0;
            poteauxSpan.textContent = poteaux;
            verinsSpan.textContent = verins;
            calesSpan.textContent = cales;

            // schéma
            let schema = '';
            for (let p = 0; p < P; p++) {
                for (let l = 0; l < L; l++) {
                    schema += '●';
                    if (l < L - 1) schema += '—';
                }
                if (p < P - 1) schema += '\n';
            }
            schemaPre.textContent = schema || '●';

            saveToStorage();
        }

        // ----- reset complet -----
        function resetComplet() {
            localStorage.removeItem('etayage_largeur');
            localStorage.removeItem('etayage_largeurUnit');
            localStorage.removeItem('etayage_profondeur');
            localStorage.removeItem('etayage_profondeurUnit');

            largeurInput.value = '4';
            largeurUnit.value = 'mailles';
            profondeurInput.value = '';
            profondeurUnit.value = 'mailles';

            compoPoteaux.value = 1;
            compoVerins.value = 2;
            compoCales.value = 2;

            mettreAJour();
        }

        function resetCompoSeule() {
            compoPoteaux.value = 1;
            compoVerins.value = 2;
            compoCales.value = 2;
            mettreAJour();
        }

        function exporterImage() {
            const element = document.getElementById('exportBlock');
            if (!element) return;
            html2canvas(element, {
                scale: 1.8,
                backgroundColor: '#ffffff',
                allowTaint: false,
                useCORS: true,
                logging: false
            }).then((canvas) => {
                const link = document.createElement('a');
                link.download = 'etayage-schema.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(() => alert("Export échoué"));
        }

        // ----- events -----
        btnCalculer.addEventListener('click', (e) => { e.preventDefault(); mettreAJour(); });
        btnReset.addEventListener('click', (e) => { e.preventDefault(); resetComplet(); });
        btnResetCompo.addEventListener('click', (e) => { e.preventDefault(); resetCompoSeule(); });
        btnExporter.addEventListener('click', (e) => { e.preventDefault(); exporterImage(); });

        // restauration
        loadFromStorage();
        window.addEventListener('load', function() {
            if (!profondeurInput.value || profondeurInput.value.trim() === '') {
                profondeurInput.value = profondeurUnit.value === 'metres' ? '2' : '1';
            }
            mettreAJour();
        });

        mettreAJour();

        // sauvegarde silencieuse
        largeurInput.addEventListener('change', saveToStorage);
        largeurUnit.addEventListener('change', saveToStorage);
        profondeurInput.addEventListener('change', saveToStorage);
        profondeurUnit.addEventListener('change', saveToStorage);
    })();
</script>
</body>
</html>
